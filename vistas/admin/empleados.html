<div class="admin-subview active">
    <div class="welcome-banner">
        <h2>📋 Gestión de Empleados</h2>
        <p>Administra los accesos y roles de tus vendedores autorizados del establecimiento.</p>
    </div>

    <div class="operaciones-box" style="margin-bottom: 25px; padding: 20px !important; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);">
        <h3 style="margin-top: 0; margin-bottom: 15px; color: #1e293b; font-size: 16px; font-weight: 600;">👤 Registrar Nuevo Personal</h3>
        <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
            <div class="form-group-vendedor" style="flex: 1; min-width: 200px; margin-bottom: 0 !important;">
                <input id="empleado-nombre" type="text" placeholder="Nombre completo" style="width: 100%;">
            </div>
            <div class="form-group-vendedor" style="flex: 1; min-width: 200px; margin-bottom: 0 !important;">
                <input id="empleado-email" type="email" placeholder="Correo electrónico" style="width: 100%;">
            </div>
            <div class="form-group-vendedor" style="flex: 1; min-width: 150px; margin-bottom: 0 !important;">
                <input id="empleado-password" type="password" placeholder="Contraseña de acceso" style="width: 100%;">
            </div>
            <div class="form-group-vendedor" style="width: 160px; margin-bottom: 0 !important;">
                <select id="empleado-rol" style="width: 100%;">
                    <option value="empleado">👤 Empleado</option>
                    <option value="admin">🔑 Administrador</option>
                </select>
            </div>
            <button id="btn-guardar-empleado" class="btn-action" style="padding: 0 24px !important; height: 40px; background-color: #0284c7; color: white; font-weight: 600; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgb(0 0 0 / 0.1);" title="Guardar cambios">
                Guardar
            </button>
        </div>
    </div>

    <div class="carrito-box" style="padding: 20px !important; overflow-x: auto; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);">
        <h3 style="margin-top: 0; margin-bottom: 15px; color: #1e293b; font-size: 16px; font-weight: 600;">📋 Lista de Personal Autorizado</h3>
        <table style="width: 100%; border-collapse: separate; border-spacing: 0 8px;">
            <thead>
                <tr style="color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;">
                    <th style="width: 60px; padding: 12px 16px; text-align: left;">ID</th>
                    <th style="text-align: left; padding: 12px 16px;">Nombre</th>
                    <th style="text-align: left; padding: 12px 16px;">Email</th>
                    <th style="text-align: left; padding: 12px 16px; width: 140px;">Rol</th>
                    <th style="text-align: left; padding: 12px 16px; width: 150px;">Fecha Registro</th>
                    <th style="text-align: center; padding: 12px 16px; width: 160px;">Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-empleados">
                <tr>
                    <td colspan="6" style="text-align: center; padding: 40px; color: #64748b; font-size: 15px;">
                        ⏳ Cargando personal oficial...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
