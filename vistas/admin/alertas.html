<div class="admin-subview active">

    <!-- Encabezado -->
    <div class="welcome-banner">
        <h2>⚠️ Panel de Alertas de Stock</h2>
        <p>Revise los productos con bajo stock o agotados para programar su reposición a tiempo.</p>
    </div>

    <!-- Tarjetas KPI -->
    <div style="display:flex; gap:20px; margin:25px 0; flex-wrap:wrap;">

        <div style="flex:1; min-width:220px; background:#ffffff; border-left:6px solid #2563eb; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.08);">
            <div style="font-size:28px;">🚨</div>
            <h2 id="total-alertas" style="margin:8px 0 5px;">0</h2>
            <span style="color:#64748b;">Total de Alertas</span>
        </div>

        <div style="flex:1; min-width:220px; background:#ffffff; border-left:6px solid #dc2626; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.08);">
            <div style="font-size:28px;">❌</div>
            <h2 id="total-agotados" style="margin:8px 0 5px;">0</h2>
            <span style="color:#64748b;">Productos Agotados</span>
        </div>

        <div style="flex:1; min-width:220px; background:#ffffff; border-left:6px solid #f59e0b; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.08);">
            <div style="font-size:28px;">⚠️</div>
            <h2 id="total-bajo-stock" style="margin:8px 0 5px;">0</h2>
            <span style="color:#64748b;">Bajo Stock</span>
        </div>

    </div>

    <!-- Buscador -->
<!-- Buscador + Filtros -->
<div style="
display:flex;
align-items:center;
gap:12px;
flex-wrap:wrap;
margin:25px 0;
">

    <input
        type="text"
        id="buscar-alerta"
        placeholder="🔍 Buscar producto..."
        style="
            flex:1;
            min-width:260px;
            max-width:420px;
            padding:12px 16px;
            border:1px solid #cbd5e1;
            border-radius:8px;
            font-size:15px;
            background:white;
        "
    >

    <button id="filtro-todos"
        style="
        padding:10px 18px;
        border:none;
        border-radius:8px;
        background:#0284c7;
        color:white;
        cursor:pointer;
        font-weight:600;">
        📋 Todos
    </button>

    <button id="filtro-bajo"
        style="
        padding:10px 18px;
        border:none;
        border-radius:8px;
        background:#fbbf24;
        cursor:pointer;
        font-weight:600;">
        🟡 Bajo Stock
    </button>

    <button id="filtro-agotado"
        style="
        padding:10px 18px;
        border:none;
        border-radius:8px;
        background:#ef4444;
        color:white;
        cursor:pointer;
        font-weight:600;">
        🔴 Agotados
    </button>

</div>

    <!-- Tabla -->
    <div class="carrito-box" style="padding:15px !important; overflow-x:auto;">

        <table style="width:100%;">

            <thead>

                <tr>

                    <th style="width:70px;">ID</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th style="text-align:center;">Stock</th>
                    <th style="text-align:center;">Mínimo</th>
                    <th style="text-align:center;">Estado</th>

                </tr>

            </thead>

            <tbody id="tabla-alertas">

                <tr>

                    <td colspan="6" style="text-align:center;padding:35px;color:#64748b;">

                        ⏳ Cargando productos...

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
