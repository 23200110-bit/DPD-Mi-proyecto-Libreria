<div class="admin-subview active">
    <div class="welcome-banner">
        <h2>📋 Control Maestro de Inventario</h2>
        <p>Monitoreo global de stock, categorías y estados del establecimiento.</p>
    </div>

    <div class="operaciones-box" style="margin-bottom: 20px; padding: 20px !important;">
        <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center; width: 100%;">
            <div class="form-group-vendedor" style="flex: 2; min-width: 350px; margin-bottom: 0 !important;">
                <input type="text" id="admin-buscar-inventario" placeholder="🔍 Buscar producto por su nombre o marca registrada..." style="width: 100% !important; padding: 14px 18px !important; font-size: 15px !important; border-radius: 10px !important; border: 1px solid #cbd5e1; box-sizing: border-box;">
            </div>
            <div class="form-group-vendedor" style="flex: 1; min-width: 180px; max-width: 250px; margin-bottom: 0 !important;">
                <select id="admin-filtros-stock" style="width: 100% !important; height: 50px !important; padding: 0 12px !important; font-size: 14px !important; border-radius: 10px !important; border: 1px solid #cbd5e1; background-color: #fff;">
                    <option value="todos">📦 Todos los productos</option>
                    <option value="disponible">✅ Con Stock</option>
                    <option value="alerta">⚠️ Alerta Mínima</option>
                    <option value="agotado">❌ Agotados</option>
                </select>
            </div>
        </div>
    </div>

    <div class="carrito-box" style="padding: 20px !important; overflow-x: auto; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);">
        <table style="width: 100%; border-collapse: separate; border-spacing: 0 8px;">
            <thead>
                <tr style="color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;">
                    <th style="width: 60px; padding: 12px 16px; text-align: left;">ID</th>
                    <th style="text-align: left; padding: 12px 16px;">Producto</th>
                    <th style="text-align: left; padding: 12px 16px;">Marca</th>
                    <th style="text-align: left; padding: 12px 16px;">Categoría</th>
                    <th style="text-align: left; padding: 12px 16px; width: 140px;">Código de Barras</th>
                    <th style="text-align: right; padding: 12px 16px; width: 110px;">Precio Costo</th> 
                    <th style="text-align: right; padding: 12px 16px; width: 110px;">Precio Venta</th>
                    <th style="text-align: center; padding: 12px 16px; width: 90px;">Stock</th>
                    <th style="text-align: center; padding: 12px 16px; width: 120px;">Estado</th>
                    <th style="text-align: center; padding: 12px 16px; width: 100px;">Acciones</th>
                </tr>
            </thead>
            <tbody id="admin-tabla-inventario-cuerpo">
                <tr>
                    <td colspan="10" style="text-align: center; padding: 40px; color: #64748b; font-size: 15px;">
                        ⏳ Cargando registros oficiales...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="modal-editar-producto" class="modal-escaner-fondo" style="display:none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:99999;">
        <div class="modal-escaner-caja" style="background:#fff; padding:25px; border-radius:16px; width:90%; max-width:500px; box-shadow:0 10px 25px rgba(0,0,0,0.2); box-sizing: border-box;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid #e2e8f0; padding-bottom:12px;">
                <h3 style="margin:0; color:#0f172a; font-size:18px;">✏️ Editar Información del Producto</h3>
                <button type="button" id="btn-cerrar-modal-editar" style="background:none; border:none; font-size:20px; cursor:pointer; color:#64748b;">✕</button>
            </div>

            <form id="form-editar-inventario" style="display:flex; flex-direction:column; gap:14px;">
                <input type="hidden" id="edit-prod-id">
                
                <div>
                    <label style="display:block; font-weight:600; margin-bottom:5px; font-size:13px; color:#334155;">Nombre del Producto *</label>
                    <input type="text" id="edit-prod-nombre" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1; box-sizing:border-box;">
                </div>

                <div>
                    <label style="display:block; font-weight:600; margin-bottom:5px; font-size:13px; color:#334155;">Marca</label>
                    <input type="text" id="edit-prod-marca" style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1; box-sizing:border-box;">
                </div>

                <div>
                    <label style="display:block; font-weight:600; margin-bottom:5px; font-size:13px; color:#334155;">Categoría *</label>
                    <select id="edit-prod-categoria" required style="width:100%; height:42px; padding:0 10px; border-radius:8px; border:1px solid #cbd5e1; box-sizing:border-box; background-color:#fff;">
                        <option value="Utiles Escolares">Útiles Escolares</option>
                        <option value="Oficina">Oficina y Escritorio</option>
                        <option value="Textos">Libros y Textos</option>
                        <option value="Papeleria">Papelería y Cartulinas</option>
                    </select>
                </div>

                <div>
                    <label style="display:block; font-weight:600; margin-bottom:5px; font-size:13px; color:#334155;">Código de Barras</label>
                    <input type="number" id="edit-prod-codigo" style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1; box-sizing:border-box;">
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div>
                        <label style="display:block; font-weight:600; margin-bottom:5px; font-size:13px; color:#334155;">Precio Venta (S/) *</label>
                        <input type="number" step="0.01" id="edit-prod-venta" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1; box-sizing:border-box;">
                    </div>
                    <div>
                        <label style="display:block; font-weight:600; margin-bottom:5px; font-size:13px; color:#334155;">Stock Actual *</label>
                        <input type="number" id="edit-prod-stock" required style="width:100%; padding:10px; border-radius:8px; border:1px solid #cbd5e1; box-sizing:border-box;">
                    </div>
                </div>

                <div style="display:flex; gap:12px; margin-top:15px; justify-content:flex-end;">
                    <button type="button" id="btn-cancelar-modal-editar" style="background:#e2e8f0; color:#475569; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600;">Cancelar</button>
                    <button type="submit" style="background:#0284c7; color:white; border:none; padding:10px 25px; border-radius:8px; cursor:pointer; font-weight:600;">Sincronizar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>
