<div class="admin-subview active">
    <div class="welcome-banner">
        <h2>📋 Control Maestro de Inventario</h2>
        <p>Monitoreo global de stock, categorías y estados del establecimiento.</p>
    </div>

    <div class="operaciones-box" style="margin-bottom: 20px; padding: 15px !important;">
        <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
            <div class="form-group-vendedor" style="flex: 1; min-width: 250px; margin-bottom: 0 !important;">
                <input type="text" id="admin-buscar-inventario" placeholder="🔍 Buscar por nombre o marca...">
            </div>
            <div class="form-group-vendedor" style="width: 200px; margin-bottom: 0 !important;">
                <select id="admin-filtros-stock">
                    <option value="todos">📦 Todos los productos</option>
                    <option value="disponible">✅ Con Stock</option>
                    <option value="alerta">⚠️ Alerta Mínima</option>
                    <option value="agotado">❌ Agotados</option>
                </select>
            </div>
        </div>
    </div>

    <div class="carrito-box" style="padding: 20px !important; overflow-x: auto; border-radius: 12px; background: #ffffff; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);">
        <table style="width: 100%; border-collapse: separate; border-spacing: 0 8px;">
            <thead>
                <tr style="color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em;">
                    <th style="width: 60px; padding: 12px 16px; text-align: left;">ID</th>
                    <th style="text-align: left; padding: 12px 16px;">Producto</th>
                    <th style="text-align: left; padding: 12px 16px;">Marca</th>
                    <th style="text-align: left; padding: 12px 16px;">Categoría</th>
                    <th style="text-align: left; padding: 12px 16px; width: 140px;">Código de Barras</th>
                    <th style="text-align: right; padding: 12px 16px; width: 110px;">Precio Costo</th> 
                    <th style="text-align: right; padding: 12px 16px; width: 110px;">Precio Venta</th>
                    <th style="text-align: center; padding: 12px 16px; width: 90px;">Stock</th>
                    <th style="text-align: center; padding: 12px 16px; width: 120px;">Estado</th>
                    <th style="text-align: center; padding: 12px 16px; width: 100px;">Acciones</th>
                </tr>
            </thead>
            <tbody id="admin-tabla-inventario-cuerpo">
                <tr>
                    <td colspan="10" style="text-align: center; padding: 40px; color: #64748b; font-size: 15px;">
                        ⏳ Cargando registros oficiales...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
