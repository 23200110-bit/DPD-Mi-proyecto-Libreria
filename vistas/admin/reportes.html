<div class="welcome-banner">
    <h2>📊 Reportes y Analítica Avanzada</h2>
    <p>Consulta el consolidado de movimientos y analiza el rendimiento del negocio en tiempo real</p>
</div>

<div style="background:white; padding:24px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:20px; display:flex; justify-content:between; align-items:center; flex-wrap:wrap; gap:15px;">
    <div>
        <label style="font-weight:600; margin-right:8px;">Tipo de Reporte:</label>
        <select id="reporte-tipo" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1;">
            <option value="ventas">Consolidado de Ventas</option>
            <option value="inventario">Estado de Inventario (Stock)</option>
        </select>
    </div>
    
    <div style="display:flex; gap:10px;">
        <button id="btn-exportar-excel" style="background:#16a34a; color:white; border:none; padding:10px 16px; border-radius:6px; font-weight:600; cursor:pointer;">
            🟢 Exportar Excel (.csv)
        </button>
        <button id="btn-imprimir-pdf" style="background:#dc2626; color:white; border:none; padding:10px 16px; border-radius:6px; font-weight:600; cursor:pointer;">
            🔴 Imprimir / Guardar PDF
        </button>
    </div>
</div>

<div style="background:white; padding:24px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:20px;">
    <h3 id="grafico-titulo" style="margin-bottom:15px; color:#1e293b;">📈 Gráfico Estadístico de Resumen</h3>
    <div style="height: 280px; position: relative;">
        <canvas id="graficoReporte"></canvas>
    </div>
</div>

<div style="background:white; padding:24px; border-radius:12px; border:1px solid #e2e8f0;">
    <h3 id="reporte-titulo" style="margin-bottom:15px; color:#1e293b;">Consolidado de Ventas</h3>
    <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse:collapse;">
            <thead id="tabla-reporte-head">
                </thead>
            <tbody id="tabla-reporte-body">
                <tr>
                    <td style="text-align:center; padding:20px; color:#64748b;">
                        Cargando datos del reporte...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
