<div class="welcome-banner">
    <h2>📊 Reportes y Analítica Avanzada</h2>
    <p>Consulta el consolidado de movimientos y exporta los datos del negocio</p>
</div>

<div style="background:white; padding:24px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; gap:15px; flex-wrap:wrap;">
    <div>
        <label style="font-weight:600; margin-right:8px;">Tipo de Reporte:</label>
        <select id="reporte-tipo" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1;">
            <option value="ventas">Consolidado de Ventas</option>
            <option value="inventario">Estado de Inventario (Stock)</option>
        </select>
    </div>
    
    <div style="display:flex; gap:10px;">
        <button id="btn-exportar-excel" style="background:#16a34a; color:white; border:none; padding:10px 16px; border-radius:6px; font-weight:600; cursor:pointer;">
            🟢 Exportar Excel (.csv)
        </button>
        <button id="btn-imprimir-pdf" style="background:#dc2626; color:white; border:none; padding:10px 16px; border-radius:6px; font-weight:600; cursor:pointer;">
            🔴 Imprimir / Guardar PDF
        </button>
    </div>
</div>

<div style="background:white; padding:24px; border-radius:12px; border:1px solid #e2e8f0;">
    <h3 id="reporte-titulo" style="margin-bottom:15px;">Consolidado de Ventas</h3>
    
    <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse:collapse;">
            <thead style="background:#f8fafc; text-align:left;">
                <tr id="reporte-th-container">
                    </tr>
            </thead>
            <tbody id="reporte-tbody-container">
                <tr>
                    <td style="text-align:center; padding:20px; color:#64748b;">Cargando reporte...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
