<div class="reportes-contenedor">

  <div class="reportes-cabecera">
    <div>
      <h2>📊 Reportes y Analítica</h2>
      <p>Consulta el rendimiento del negocio en tiempo real</p>
    </div>
    <div class="reportes-acciones">
      <button id="btn-exportar-excel" class="btn-exportar">🟢 Exportar CSV</button>
      <button id="btn-imprimir-pdf"   class="btn-imprimir">🔴 Imprimir PDF</button>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icono" style="background:#dbeafe;">💰</div>
      <div class="kpi-info">
        <p class="kpi-label">Ingresos Totales</p>
        <p class="kpi-valor" id="kpi-ingresos">S/ 0.00</p>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icono" style="background:#dcfce7;">🛒</div>
      <div class="kpi-info">
        <p class="kpi-label">Total de Ventas</p>
        <p class="kpi-valor" id="kpi-ventas">0</p>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icono" style="background:#fef9c3;">🧾</div>
      <div class="kpi-info">
        <p class="kpi-label">Ticket Promedio</p>
        <p class="kpi-valor" id="kpi-promedio">S/ 0.00</p>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icono" style="background:#fee2e2;">⚠️</div>
      <div class="kpi-info">
        <p class="kpi-label">Stock Bajo</p>
        <p class="kpi-valor" id="kpi-stock-bajo">0 productos</p>
      </div>
    </div>
  </div>

  <!-- Selector -->
  <div class="reportes-selector-card">
    <label class="selector-label">Tipo de Reporte:</label>
    <select id="reporte-tipo" class="selector-reporte">
      <option value="ventas">📈 Evolución de Ventas</option>
      <option value="metodo-pago">💳 Ventas por Método de Pago</option>
      <option value="top-productos">🏆 Top Productos Más Vendidos</option>
      <option value="ventas-dia">📅 Ventas por Día de la Semana</option>
      <option value="inventario">📦 Estado de Inventario</option>
      <option value="margen-ganancia">💹 Margen de Ganancia por Producto</option>
      <option value="hora-pico">🕐 Hora Pico de Ventas</option>
    </select>
  </div>

  <!-- Gráfico -->
  <div class="reporte-chart-card">
    <h3 id="grafico-titulo" class="reporte-chart-titulo">📈 Evolución de Ventas</h3>
    <div class="reporte-chart-wrapper">
      <canvas id="graficoReporte"></canvas>
    </div>
  </div>

  <!-- Tabla -->
  <div class="reporte-tabla-card">
    <h3 id="reporte-titulo" class="reporte-tabla-titulo">Consolidado de Ventas</h3>
    <div style="overflow-x:auto;">
      <table class="tabla-reporte">
        <thead id="tabla-reporte-head"></thead>
        <tbody id="tabla-reporte-body">
          <tr><td colspan="6" class="tabla-cargando">⏳ Cargando datos...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
